<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archimedes Math Worksheet - Student Session</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #2c3e50, #3498db);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.8em;
        }

        .student-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-group label {
            font-weight: 600;
            color: #495057;
            min-width: 80px;
        }

        .control-group input,
        .control-group select {
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #1e7e34;
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 0;
            min-height: 70vh; /* Use min-height instead of fixed height to allow natural scrolling */
        }

        .worksheet-container {
            border-right: 1px solid #dee2e6;
            position: relative;
            min-height: 400px;
            height: calc(100vh - 120px); /* Dynamic height based on viewport, minus header/padding */
            max-height: 800px;
        }

        .worksheet-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            color: #6c757d;
        }

        .sidebar {
            background: #f8f9fa;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .session-info {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
        }

        .session-info h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.9em;
        }

        .info-label {
            font-weight: 600;
            color: #495057;
        }

        .info-value {
            color: #6c757d;
        }

        .answer-section {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
        }

        .answer-input {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            align-items: center;
        }

        .answer-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        .timer {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .timer-display {
            font-size: 1.5em;
            font-weight: bold;
            color: #856404;
        }

        .results {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            display: none;
        }

        .results.error {
            background: #f8d7da;
            border-color: #f5c6cb;
        }

        .score-display {
            text-align: center;
            margin: 15px 0;
        }

        .score-circle {
            display: inline-block;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #28a745;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px auto;
        }

        .score-circle.low {
            background: #dc3545;
        }

        .score-circle.medium {
            background: #ffc107;
            color: #212529;
        }

        .error-message {
            color: #721c24;
            background: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 300px;
                height: auto;
            }

            .sidebar {
                border-top: 1px solid #dee2e6;
                border-right: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📐 Archimedes Math Worksheet</h1>
            <div class="student-info">
                <div>Student: <span id="headerStudentId">-</span></div>
                <div>Worksheet: <span id="headerWorksheetId">-</span></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="studentId">Student ID:</label>
                <input type="text" id="studentId" value="1000" placeholder="Enter student ID">
            </div>

            <div class="control-group">
                <label for="worksheetId">Worksheet:</label>
                <select id="worksheetId">
                    <option value="">Select worksheet...</option>
                    <option value="AL01">AL01 - Solving Equations (aX = c)</option>
                    <option value="AL02">AL02 - Solving Equations (X/a = c)</option>
                    <option value="AR01">AR01 - Basic Arithmetic</option>
                    <option value="CM01">CM01 - Calculus Basics</option>
                    <option value="DE01">DE01 - Decimal Operations</option>
                    <option value="FR01">FR01 - Fraction Quiz</option>
                </select>
            </div>

            <button class="btn btn-primary" onclick="startWorksheet()">Start Worksheet</button>
            <button class="btn btn-warning" onclick="loadWorksheetsList()">Load All Worksheets</button>
            <button class="btn" onclick="testPersonalization()" style="background: #17a2b8; color: white;">Test
                Personalization</button>
        </div>

        <div class="main-content">
            <div class="worksheet-container">
                <iframe id="worksheetFrame" class="worksheet-frame" src="about:blank"></iframe>
                <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                    <div>🔄 Loading worksheet...</div>
                </div>
            </div>

            <div class="sidebar">
                <div class="session-info">
                    <h3>📊 Session Info</h3>
                    <div class="info-item">
                        <span class="info-label">Session ID:</span>
                        <span class="info-value" id="sessionId">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Status:</span>
                        <span class="info-value" id="sessionStatus">Ready</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Started:</span>
                        <span class="info-value" id="sessionStarted">-</span>
                    </div>
                </div>

                <div class="timer">
                    <div>⏱️ Time Elapsed</div>
                    <div class="timer-display" id="timerDisplay">00:00</div>
                </div>

                <div id="gradeDisplay" class="results" style="display: none;">
                    <h3>🎯 Your Grade</h3>
                    <div class="score-display">
                        <div id="finalScoreCircle" class="score-circle">-</div>
                        <div><strong>Final Score</strong></div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Status:</span>
                        <span class="info-value" id="submissionStatus">Submitted</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Time:</span>
                        <span class="info-value" id="finalTimeTaken">-</span>
                    </div>
                </div>

                <div class="answer-section">
                    <button class="btn" onclick="viewCompletedWorksheet()"
                        style="width: 100%; margin-top: 5px; background: #28a745; color: white;">
                        View Completed Worksheet
                    </button>
                </div>

                <div id="results" class="results">
                    <h3>🎉 Results</h3>
                    <div class="score-display">
                        <div id="scoreCircle" class="score-circle">-</div>
                        <div><strong>Your Score</strong></div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Correct:</span>
                        <span class="info-value" id="correctCount">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Total:</span>
                        <span class="info-value" id="totalCount">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Time:</span>
                        <span class="info-value" id="timeTaken">-</span>
                    </div>

                    <button class="btn btn-primary" onclick="startNewWorksheet()"
                        style="width: 100%; margin-top: 15px;">
                        Try Another Worksheet
                    </button>
                </div>

                <div id="errorMessage" class="error-message"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8001/api/v1';
        let currentSession = null;
        let startTime = null;
        let timerInterval = null;

        // Load available worksheets into dropdown
        async function loadWorksheetsList() {
            try {
                const response = await fetch(`${API_BASE_URL}/topics`);
                const topics = await response.json();

                const select = document.getElementById('worksheetId');
                select.innerHTML = '<option value="">Select worksheet...</option>';

                topics.forEach(topic => {
                    topic.worksheets.slice(0, 3).forEach(worksheet => {
                        const option = document.createElement('option');
                        option.value = worksheet.id;
                        option.textContent = `${worksheet.id} - ${worksheet.title}`;
                        select.appendChild(option);
                    });
                });

                showMessage('Worksheets loaded successfully!', 'success');

            } catch (error) {
                console.error('Error loading worksheets:', error);
                showError('Failed to load worksheets: ' + error.message);
            }
        }

        // Start a worksheet session
        async function startWorksheet() {
            const studentId = document.getElementById('studentId').value.trim();
            const worksheetId = document.getElementById('worksheetId').value;

            if (!studentId) {
                showError('Please enter a student ID');
                return;
            }

            if (!worksheetId) {
                showError('Please select a worksheet');
                return;
            }

            try {
                // Show loading
                document.getElementById('loadingOverlay').style.display = 'flex';
                document.getElementById('sessionStatus').textContent = 'Creating session...';

                // Create session
                const sessionResponse = await fetch(`${API_BASE_URL}/sessions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        student_id: studentId,
                        worksheet_id: worksheetId
                    })
                });

                if (!sessionResponse.ok) {
                    throw new Error(`Failed to create session: ${sessionResponse.status}`);
                }

                currentSession = await sessionResponse.json();

                // Update UI
                document.getElementById('headerStudentId').textContent = studentId;
                document.getElementById('headerWorksheetId').textContent = worksheetId;
                document.getElementById('sessionId').textContent = currentSession.session_id.slice(0, 8) + '...';
                document.getElementById('sessionStatus').textContent = 'Active';
                document.getElementById('sessionStarted').textContent = new Date(currentSession.started_at).toLocaleTimeString();

                // Start timer
                startTimer();

                // Load worksheet content
                const worksheetUrl = `${API_BASE_URL}/worksheets/${worksheetId}/content?student_id=${studentId}`;
                document.getElementById('worksheetFrame').src = worksheetUrl;

                // Simple iframe loading - no height calculation needed
                const iframe = document.getElementById('worksheetFrame');

                iframe.onload = function () {
                    console.log('Worksheet loaded in iframe');
                    document.getElementById('loadingOverlay').style.display = 'none';

                    // Set up submission monitoring
                    setupSubmissionMonitoring();
                };

                // Fallback to hide loading
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 2000);

                // Hide results if showing
                document.getElementById('results').style.display = 'none';

                showMessage('Worksheet session started successfully!', 'success');

            } catch (error) {
                console.error('Error starting worksheet:', error);
                showError('Failed to start worksheet: ' + error.message);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // Submit answers
        async function submitAnswers() {
            if (!currentSession) {
                showError('No active session. Please start a worksheet first.');
                return;
            }

            const answers = {
                q1: document.getElementById('answer1').value,
                q2: document.getElementById('answer2').value,
                q3: document.getElementById('answer3').value
            };

            // Remove empty answers
            Object.keys(answers).forEach(key => {
                if (!answers[key].trim()) {
                    delete answers[key];
                }
            });

            if (Object.keys(answers).length === 0) {
                showError('Please enter at least one answer');
                return;
            }

            try {
                document.getElementById('sessionStatus').textContent = 'Submitting...';

                const timeElapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;

                const response = await fetch(`${API_BASE_URL}/sessions/${currentSession.session_id}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        answers: answers,
                        time_taken_seconds: timeElapsed
                    })
                });

                if (!response.ok) {
                    throw new Error(`Failed to submit answers: ${response.status}`);
                }

                const results = await response.json();

                // Stop timer
                if (timerInterval) {
                    clearInterval(timerInterval);
                }

                // Show results
                displayResults(results);

                document.getElementById('sessionStatus').textContent = 'Completed';

            } catch (error) {
                console.error('Error submitting answers:', error);
                showError('Failed to submit answers: ' + error.message);
            }
        }

        // View completed worksheet with grade
        async function viewCompletedWorksheet() {
            if (!currentSession) {
                showError('No active session. Please complete a worksheet first.');
                return;
            }

            try {
                showMessage('Loading completed worksheet with grade...', 'info');

                const studentId = document.getElementById('studentId').value;
                const worksheetId = document.getElementById('worksheetId').value;
                const sessionId = currentSession.session_id;

                // Open completed worksheet in new tab/window with grade populated
                const completedUrl = `${API_BASE_URL}/worksheets/${worksheetId}/completed?student_id=${studentId}&session_id=${sessionId}`;
                window.open(completedUrl, '_blank', 'width=1200,height=800');

                showMessage('Completed worksheet opened in new tab!', 'success');

            } catch (error) {
                console.error('Error viewing completed worksheet:', error);
                showError('Failed to load completed worksheet: ' + error.message);
            }
        }

        // Show expected answers for current worksheet
        function showExpectedAnswers() {
            const worksheetId = document.getElementById('worksheetId').value;

            if (!worksheetId) {
                showError('Please select a worksheet first');
                return;
            }

            // Calculate expected answers based on same logic as backend
            const expectedAnswers = calculateExpectedAnswers(worksheetId);

            // Show hints
            document.getElementById('hint1').textContent = `Expected: ${expectedAnswers.q1}`;
            document.getElementById('hint2').textContent = `Expected: ${expectedAnswers.q2}`;
            document.getElementById('hint3').textContent = `Expected: ${expectedAnswers.q3}`;

            // Fill in the answers (for demo purposes)
            document.getElementById('answer1').value = expectedAnswers.q1;
            document.getElementById('answer2').value = expectedAnswers.q2;
            document.getElementById('answer3').value = expectedAnswers.q3;

            showMessage('Expected answers filled in - try submitting now!', 'success');
        }

        // Calculate expected answers (matches backend logic)
        function calculateExpectedAnswers(worksheetId) {
            const answers = {};

            ['q1', 'q2', 'q3'].forEach(questionId => {
                const seed = hashCode(`${worksheetId}_${questionId}`) % 100;

                if (worksheetId.startsWith('AL')) {  // Algebra
                    answers[questionId] = String((Math.abs(seed) % 20) + 1);
                } else if (worksheetId.startsWith('AR')) {  // Arithmetic  
                    answers[questionId] = String((Math.abs(seed) % 50) + 10);
                } else if (worksheetId.startsWith('FR')) {  // Fractions
                    answers[questionId] = `${(Math.abs(seed) % 9) + 1}/${(Math.abs(seed) % 7) + 2}`;
                } else {  // Generic
                    answers[questionId] = `answer_${Math.abs(seed) % 10}`;
                }
            });

            return answers;
        }

        // Simple hash function to match backend logic
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32-bit integer
            }
            return hash;
        }

        // Display results
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            const scoreCircle = document.getElementById('scoreCircle');

            // Update score display
            const score = Math.round(results.score || 0);
            scoreCircle.textContent = `${score}%`;

            // Set score color
            scoreCircle.className = 'score-circle';
            if (score >= 80) {
                scoreCircle.classList.add('high');
            } else if (score >= 60) {
                scoreCircle.classList.add('medium');
            } else {
                scoreCircle.classList.add('low');
            }

            // Update other info
            document.getElementById('correctCount').textContent = results.correct_answers || 0;
            document.getElementById('totalCount').textContent = results.total_questions || 0;
            document.getElementById('timeTaken').textContent = formatTime(results.time_taken_seconds || 0);

            // Show results
            resultsDiv.style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // Start new worksheet
        function startNewWorksheet() {
            // Reset form
            document.getElementById('worksheetId').value = '';
            document.getElementById('answer1').value = '';
            document.getElementById('answer2').value = '';
            document.getElementById('answer3').value = '';

            // Reset session
            currentSession = null;
            startTime = null;

            // Reset UI
            document.getElementById('worksheetFrame').src = 'about:blank';
            document.getElementById('results').style.display = 'none';
            document.getElementById('sessionId').textContent = '-';
            document.getElementById('sessionStatus').textContent = 'Ready';
            document.getElementById('sessionStarted').textContent = '-';
            document.getElementById('timerDisplay').textContent = '00:00';
            document.getElementById('headerStudentId').textContent = '-';
            document.getElementById('headerWorksheetId').textContent = '-';

            if (timerInterval) {
                clearInterval(timerInterval);
            }
        }

        // Timer functions
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timerDisplay').textContent = formatTime(elapsed);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Monitor iframe for worksheet submissions using postMessage
        function setupSubmissionMonitoring() {
            console.log('Setting up submission monitoring via postMessage...');

            // Listen for messages from the worksheet iframe
            window.addEventListener('message', (event) => {
                // Security check - ensure message is from our iframe
                const iframe = document.getElementById('worksheetFrame');
                if (event.source === iframe.contentWindow) {
                    console.log('Received message from worksheet:', event.data);

                    if (event.data.type === 'worksheet-submitted') {
                        handleWorksheetSubmission(null, event.data.answers, event.data.grade, event.data.completedHtml);
                    } else if (event.data.type === 'grade-updated') {
                        displayGradeInSidebar({ score: event.data.grade });
                    }
                }
            });

            console.log('PostMessage listener setup complete');
        }

        // Track submission status to prevent double submissions
        let submissionInProgress = false;
        let sessionCompleted = false;

        // Handle worksheet submission and grade calculation
        async function handleWorksheetSubmission(event, providedAnswers = null, providedGrade = null, providedHtml = null) {
            if (!currentSession) {
                console.warn('No active session for submission');
                return;
            }

            // Prevent multiple submissions
            if (submissionInProgress) {
                console.warn('Submission already in progress, ignoring duplicate');
                return;
            }

            if (sessionCompleted) {
                console.warn('Session already completed, ignoring additional submissions');
                showError('This worksheet has already been submitted!');
                return;
            }

            submissionInProgress = true;

            try {
                console.log('Processing worksheet submission with grade and HTML snapshot:', {
                    grade: providedGrade,
                    htmlSize: providedHtml ? providedHtml.length : 0
                });

                let answers = providedAnswers;

                // If no provided answers, create demo answers for API
                if (!answers || Object.keys(answers).length === 0) {
                    const worksheetId = document.getElementById('worksheetId').value;
                    answers = {
                        'demo_q1': `submitted_${Date.now()}`,
                        'demo_q2': 'completed_answer', 
                        'demo_q3': 'test_response'
                    };
                    console.log('No answers collected, using demo answers:', answers);
                }

                // Calculate time taken
                const timeElapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;

                // Submit to backend WITH the grade from worksheet
                const response = await fetch(`${API_BASE_URL}/sessions/${currentSession.session_id}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        answers: answers,
                        time_taken_seconds: timeElapsed,
                        grade: providedGrade,  // Include grade from worksheet
                        ...(providedHtml && { completed_html: providedHtml })  // Only include if not null/empty
                    })
                });

                if (!response.ok) {
                    if (response.status === 400) {
                        // Check if it's already completed
                        const errorText = await response.text();
                        if (errorText.includes('already completed')) {
                            sessionCompleted = true;
                            showError('This worksheet has already been submitted!');
                            return;
                        }
                    }
                    throw new Error(`Submission failed: ${response.status}`);
                }

                const results = await response.json();

                // Mark session as completed
                sessionCompleted = true;

                // Stop timer
                if (timerInterval) {
                    clearInterval(timerInterval);
                }

                // Display grade in sidebar (use grade from backend response)
                displayGradeInSidebar(results, timeElapsed);

                // Update session status
                document.getElementById('sessionStatus').textContent = 'Completed';

                console.log('Submission processed successfully:', results);
                console.log(providedGrade)

            } catch (error) {
                console.error('Error processing submission:', error);
                showError('Failed to submit worksheet: ' + error.message);
            } finally {
                // Reset submission flag to allow future attempts (in case of retries)
                submissionInProgress = false;
            }
        }

        // Display grade in sidebar
        function displayGradeInSidebar(results, timeElapsed = null) {
            const gradeDisplay = document.getElementById('gradeDisplay');
            const scoreCircle = document.getElementById('finalScoreCircle');

            // Show grade display
            gradeDisplay.style.display = 'block';

            // Update score
            const score = Math.round(results.score || 0);
            scoreCircle.textContent = `${score}%`;

            // Set score color
            scoreCircle.className = 'score-circle';
            if (score >= 80) {
                scoreCircle.style.background = '#28a745';
            } else if (score >= 60) {
                scoreCircle.style.background = '#ffc107';
                scoreCircle.style.color = '#212529';
            } else {
                scoreCircle.style.background = '#dc3545';
            }

            // Update time if provided
            if (timeElapsed !== null) {
                document.getElementById('finalTimeTaken').textContent = formatTime(timeElapsed);
            }

            // Scroll grade into view
            gradeDisplay.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Show success message
            showMessage(`Worksheet completed! Score: ${score}%`, 'success');
        }
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showMessage(message, type) {
            console.log(`${type.toUpperCase()}: ${message}`);
        }

        // Test personalization (debug function)
        async function testPersonalization() {
            const studentId = document.getElementById('studentId').value;
            const worksheetId = 'EX02';  // Test worksheet with known structure

            try {
                showMessage('Testing student personalization...', 'info');

                const response = await fetch(`${API_BASE_URL}/worksheets/${worksheetId}/content?student_id=${studentId}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch worksheet');
                }

                const htmlContent = await response.text();

                // Check for personalization markers
                const checks = {
                    hasDataFields: htmlContent.includes('data-name-field') && htmlContent.includes('data-id-field'),
                    hasStudentName: htmlContent.includes(`Student ${studentId}`),
                    hasStudentIdValue: htmlContent.includes(`value="${studentId}"`),
                    hasStudentIdDefault: htmlContent.includes(`data-default="${studentId}"`),
                    hasPersonalizationScript: htmlContent.includes('populateStudentData'),
                    hasPersonalizationHeader: htmlContent.includes('Worksheet for Student'),
                    hasDataFieldContainers: htmlContent.includes('<td') && htmlContent.includes('data-id-field'),
                    hasCommonIdFallback: htmlContent.includes('iH60') || htmlContent.includes('iI60')
                };

                console.log('Personalization check results:', checks);
                console.log('First 1000 chars of HTML:', htmlContent.substring(0, 1000));

                let message = 'Personalization Test Results:\\n';
                message += `✓ WebWorksheet data fields: ${checks.hasDataFields ? 'Found' : 'Missing'}\\n`;
                message += `✓ Data field containers (td): ${checks.hasDataFieldContainers ? 'Found' : 'Missing'}\\n`;
                message += `✓ Student name injection: ${checks.hasStudentName ? 'Found' : 'Missing'}\\n`;
                message += `✓ Student ID value attr: ${checks.hasStudentIdValue ? 'Found' : 'Missing'}\\n`;
                message += `✓ Student ID data-default: ${checks.hasStudentIdDefault ? 'Found' : 'Missing'}\\n`;
                message += `✓ Personalization script: ${checks.hasPersonalizationScript ? 'Found' : 'Missing'}\\n`;
                message += `✓ Common ID fallbacks: ${checks.hasCommonIdFallback ? 'Found' : 'Missing'}\\n`;
                message += `✓ Personalization header: ${checks.hasPersonalizationHeader ? 'Found' : 'Missing'}`;

                alert(message);
                showMessage('Personalization test completed - check console for details', 'success');

                // Open the worksheet in a new tab for visual inspection
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank', 'width=1200,height=800');

            } catch (error) {
                console.error('Error testing personalization:', error);
                showError('Failed to test personalization: ' + error.message);
            }
        }

        // Load worksheets on page load
        window.addEventListener('load', () => {
            loadWorksheetsList();
        });
    </script>
</body>

</html>
