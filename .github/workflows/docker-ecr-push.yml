# Build Docker image and push to Amazon ECR (linux/arm64 for Graviton / t4g ECS).
# Supports either:
# 1) OIDC role assumption via AWS_ROLE_TO_ASSUME (recommended), or
# 2) access keys via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (+ optional AWS_SESSION_TOKEN).
#
# See docs/shared/runbooks/aws-dev-deployment.md and docs/shared/adrs/infra/0001-aws-dev-deployment.md

name: Docker build and push to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: dev-archimedes-backend

jobs:
  push:
    # Native linux/arm64 (Graviton parity); no QEMU. Requires a repo that can use
    # GitHub-hosted ARM runners (e.g. public repos). Private: use ubuntu-latest + QEMU or a larger ARM runner.
    runs-on: ubuntu-24.04-arm
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Native docker build on ubuntu-24.04-arm → linux/arm64 image (no Buildx).
      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}"
          docker build \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg GIT_COMMIT="${IMAGE_TAG}" \
            --build-arg ENVIRONMENT=dev \
            -t "${IMAGE}:${IMAGE_TAG}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${IMAGE_TAG}"
          docker push "${IMAGE}:latest"
