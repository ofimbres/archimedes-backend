services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    network_mode: service:db
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://dev:dev123@db:5432/archimedes_education

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: dev123
      POSTGRES_USER: dev
      POSTGRES_DB: archimedes_education
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01_create_schema.sql:/docker-entrypoint-initdb.d/01_create_schema.sql
      - ./sql/02_sample_data.sql:/docker-entrypoint-initdb.d/02_sample_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d archimedes_education"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: devcontainer_postgres_data